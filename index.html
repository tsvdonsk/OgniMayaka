    <script>
      (function() {
        var p = window.location.search.slice(1).split('&').filter(function(s) { return s.startsWith('p='); })[0];
        if (p) {
          window.history.replaceState(null, null, '/' + decodeURIComponent(p.slice(2)) + window.location.hash);
        }
      })();
    </script>
